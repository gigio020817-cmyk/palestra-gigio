<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#232739">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gigio Gym</title>
<style>
  :root{
    --bg:#232739; --panel:#2B3049; --row:#3A4060; --row2:#343A57;
    --txt:#FFFFFF; --muted:#A7ADC6; --green:#7ED9A7; --green-dark:#4CAF7D;
    --red:#E57373; --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{background:var(--bg);}
  html,body{margin:0; padding:0; color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    font-size:17px; min-height:100%;}
  body{padding-bottom:env(safe-area-inset-bottom)}
  /* sfondo Goku, strato fisso dietro tutto, velo scuro leggero per leggibilità */
  body::before{content:""; position:fixed; inset:0; z-index:-1;
    background-image:
      linear-gradient(180deg, rgba(16,18,30,.38) 0%, rgba(16,18,30,.48) 50%, rgba(12,14,26,.66) 100%),
      url('goku.jpg');
    background-size: cover, cover;
    background-position: center top, center top;
    background-repeat: no-repeat, no-repeat;}
  .screen{display:none; min-height:100vh; flex-direction:column}
  .screen.active{display:flex}
  header{display:flex; align-items:center; gap:12px; padding:18px 16px 10px;
    padding-top:calc(18px + env(safe-area-inset-top)); position:sticky; top:0;
    background:rgba(20,22,38,.35); backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px); z-index:5}
  header h1{font-size:22px; font-weight:700; margin:0; flex:1; text-align:center; text-shadow:0 1px 6px rgba(0,0,0,.6)}
  .group-label{text-shadow:0 1px 6px rgba(0,0,0,.7)}
  .btn-round{width:44px; height:44px; border-radius:50%; background:var(--panel); border:none;
    color:var(--txt); font-size:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0}
  .spacer44{width:44px; flex-shrink:0}
  main{flex:1; padding:0 0 120px}
  .pad{padding:0 16px}

  /* group + exercise rows (stile screenshot) */
  .group-label{font-size:19px; font-weight:700; padding:18px 16px 10px}
  .group{background:var(--row2); margin-bottom:4px}
  .ex-row{display:flex; align-items:stretch; border-bottom:1px solid rgba(0,0,0,.15)}
  .ex-row:last-child{border-bottom:none}
  .ex-img{width:96px; min-height:96px; background:#fff; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; overflow:hidden}
  .ex-img img{width:100%; height:100%; object-fit:contain}
  .ex-img .ph{font-size:34px}
  .ex-info{flex:1; padding:14px 16px; display:flex; flex-direction:column; justify-content:center; gap:4px}
  .ex-name{font-weight:600; font-size:17px}
  .ex-meta{color:var(--muted); font-size:15px}

  /* scheda (versione più curata) */
  .sc-group{margin:0 16px 4px}
  .sc-glabel{font-size:13px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
    color:var(--green); margin:18px 2px 9px; text-shadow:0 1px 6px rgba(0,0,0,.7)}
  .sc-card{background:var(--row2); border-radius:var(--radius); overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,.28)}
  .sc-ex{display:flex; align-items:stretch; border-bottom:1px solid rgba(0,0,0,.18)}
  .sc-ex:last-child{border-bottom:none}
  .sc-ex .ex-img{width:90px; min-height:90px}
  .sc-info{flex:1; min-width:0; padding:13px 14px; display:flex; flex-direction:column;
    justify-content:center; gap:9px}
  .sc-name{font-weight:600; font-size:17px; line-height:1.25}
  .sc-badges{display:flex; gap:7px; flex-wrap:wrap}
  .sc-badge{background:var(--bg); color:var(--txt); font-size:13px; font-weight:700;
    padding:4px 11px; border-radius:20px}
  .sc-badge.alt{background:transparent; border:1px solid var(--row); color:var(--muted); font-weight:600}

  /* allenamento: info serie + controlli */
  .wo-hinfo{min-width:0}
  .wo-prog{color:var(--green); font-size:13px; font-weight:700; margin-top:4px}
  .wo-setctl{display:flex; gap:8px; padding:6px 14px 12px}
  .wo-setctl button{flex:1; background:var(--row); color:var(--txt); border:none;
    border-radius:11px; padding:10px; font-size:14px; font-weight:600}

  .cta{position:fixed; left:16px; right:16px; bottom:calc(16px + env(safe-area-inset-bottom));
    background:var(--green); color:#173324; border:none; border-radius:32px; padding:17px;
    font-size:19px; font-weight:700; width:calc(100% - 32px); z-index:6}
  .cta:disabled{opacity:.4}

  /* cards home */
  .card{background:var(--row); border-radius:var(--radius); padding:18px 16px; margin:0 16px 12px;
    display:flex; align-items:center; gap:12px}
  .card .t{flex:1}
  .card .t b{display:block; font-size:18px}
  .card .t span{color:var(--muted); font-size:14px}
  .chev{color:var(--muted); font-size:20px}
  .link-row{display:flex; gap:10px; margin:8px 16px 16px}
  .btn-ghost{flex:1; background:var(--panel); color:var(--txt); border:1px solid var(--row);
    border-radius:var(--radius); padding:13px; font-size:16px; font-weight:600}

  /* acqua */
  .water{background:var(--panel); border-radius:var(--radius); margin:12px 16px 4px; padding:16px}
  .water-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:11px}
  .water-title{font-weight:700; font-size:17px}
  .water-amt{color:var(--muted); font-size:15px}
  .water-amt b{color:#5FB6FF; font-size:17px}
  .water-bar{height:14px; background:var(--bg); border-radius:9px; overflow:hidden; margin-bottom:13px}
  .water-fill{height:100%; background:linear-gradient(90deg,#3E8BFF,#7ED2FF); border-radius:9px; transition:width .3s}
  .water-btns{display:flex; gap:8px}
  .water-btns button{flex:1; background:var(--row); color:var(--txt); border:none;
    border-radius:12px; padding:12px; font-size:15px; font-weight:600}
  .water-btns .minus{flex:0 0 50px; color:var(--muted); font-size:20px}

  /* peso */
  .weight{background:var(--panel); border-radius:var(--radius); margin:4px 16px 12px; padding:16px}
  .w-top{display:flex; justify-content:space-between; align-items:baseline}
  .w-title{font-weight:700; font-size:17px}
  .w-current{color:var(--muted); font-size:15px}
  .w-current b{color:var(--txt); font-size:21px}
  .w-sub{color:var(--muted); font-size:13px; margin-top:5px}
  .w-delta{font-weight:700}
  .w-delta.down{color:var(--green)}
  .w-delta.up{color:var(--red)}
  .w-due{color:#FFD479; font-size:13px; font-weight:600; margin-top:7px}
  .w-btns{display:flex; gap:8px; margin-top:13px}
  .w-btns button{flex:1; background:var(--row); color:var(--txt); border:none;
    border-radius:12px; padding:11px; font-size:15px; font-weight:600}
  .w-btns button.ghost{background:transparent; border:1px solid var(--row)}
  .w-hist{margin-top:10px}
  .w-hist .wr{display:flex; justify-content:space-between; align-items:center;
    padding:9px 2px; border-top:1px solid rgba(255,255,255,.07); font-size:15px}
  .w-hist .wr .wd{color:var(--muted); font-size:13px}
  .w-hist .wr .wx{background:none; border:none; color:var(--red); font-size:12px; font-weight:600}

  /* workout */
  .wo-ex{margin:0 16px 16px; background:var(--row2); border-radius:var(--radius); overflow:hidden}
  .wo-head{display:flex; gap:14px; align-items:center; padding:14px}
  .wo-head .ex-img{border-radius:10px; width:84px; min-height:84px}
  .wo-head .n{font-size:19px; font-weight:700}
  .wo-head .m{color:var(--muted); font-size:14px; margin-top:3px}
  .set-line{display:flex; align-items:center; gap:8px; padding:10px 14px; border-top:1px solid rgba(0,0,0,.15)}
  .set-line .num{width:26px; color:var(--muted); font-weight:600}
  .set-line input{width:70px; background:var(--bg); border:1px solid var(--row); border-radius:9px;
    color:var(--txt); font-size:17px; padding:9px 8px; text-align:center}
  .set-line label{color:var(--muted); font-size:13px}
  .set-done{margin-left:auto; width:40px; height:40px; border-radius:50%; border:2px solid var(--muted);
    background:transparent; color:transparent; font-size:19px; flex-shrink:0}
  .set-done.on{background:var(--green); border-color:var(--green); color:#173324}
  .last-hint{color:var(--muted); font-size:13px; padding:2px 14px 10px}

  /* timer sheet */
  #timerSheet{position:fixed; left:0; right:0; bottom:0; background:var(--panel);
    border-radius:22px 22px 0 0; padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(110%); transition:transform .25s ease; z-index:20; text-align:center;
    box-shadow:0 -8px 30px rgba(0,0,0,.4)}
  #timerSheet.open{transform:translateY(0)}
  #timerVal{font-size:56px; font-weight:800; font-variant-numeric:tabular-nums; margin:6px 0 14px}
  .timer-btns{display:flex; gap:10px}
  .timer-btns button{flex:1; border:none; border-radius:14px; padding:14px; font-size:16px; font-weight:700}
  #tPlus{background:var(--row); color:var(--txt)}
  #tSkip{background:var(--green); color:#173324}

  /* storico */
  .sess{margin:0 16px 12px; background:var(--row); border-radius:var(--radius); padding:14px 16px}
  .sess .d{font-weight:700; margin-bottom:2px}
  .sess .s{color:var(--muted); font-size:14px}
  .sess .detail{margin-top:10px; display:none; border-top:1px solid rgba(0,0,0,.2); padding-top:10px}
  .sess.open .detail{display:block}
  .detail .exl{margin-bottom:8px}
  .detail .exl b{font-size:15px}
  .detail .exl span{display:block; color:var(--muted); font-size:14px}

  /* editor */
  .field{margin:0 16px 14px}
  .field label{display:block; color:var(--muted); font-size:14px; margin-bottom:6px}
  .field input{width:100%; background:var(--panel); border:1px solid var(--row); border-radius:12px;
    color:var(--txt); font-size:17px; padding:13px}
  .ed-group{margin:0 16px 14px; background:var(--row2); border-radius:var(--radius); padding:12px}
  .ed-group h3{margin:2px 4px 10px; font-size:16px; color:var(--muted); display:flex; justify-content:space-between; align-items:center}
  .ed-group h3 button{background:none; border:none; color:var(--red); font-size:14px; font-weight:600}
  .ed-ex{background:var(--bg); border-radius:12px; padding:10px; margin-bottom:8px}
  .ed-ex input{width:100%; background:var(--panel); border:1px solid var(--row); border-radius:9px;
    color:var(--txt); font-size:15px; padding:9px; margin-bottom:6px}
  .ed-ex .r{display:flex; gap:6px}
  .ed-ex .r input{width:33%}
  .ed-ex .del{background:none; border:none; color:var(--red); font-size:13px; font-weight:600; padding:2px}
  .add-line{width:100%; background:none; border:1px dashed var(--muted); color:var(--muted);
    border-radius:12px; padding:11px; font-size:15px; margin-top:2px}
  .btn-add-group{display:block; margin:0 16px 14px; width:calc(100% - 32px)}
  .danger{color:var(--red); background:none; border:none; font-size:15px; font-weight:600; margin:8px auto 0; display:block}

  .empty{color:var(--muted); text-align:center; padding:40px 30px; line-height:1.5}
  #toast{position:fixed; left:50%; transform:translateX(-50%) translateY(20px); bottom:100px;
    background:#111524; color:#fff; padding:11px 18px; border-radius:24px; font-size:15px;
    opacity:0; transition:all .25s; z-index:30; pointer-events:none; white-space:nowrap}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* profili (persone) */
  .pbar{display:flex; gap:8px; margin:12px 16px 2px; overflow-x:auto; padding-bottom:2px}
  .pbar::-webkit-scrollbar{display:none}
  .pchip{background:var(--panel); color:var(--muted); border:1px solid var(--row); border-radius:20px;
    padding:8px 16px; font-size:15px; font-weight:600; white-space:nowrap; flex-shrink:0}
  .pchip.on{background:var(--green); color:#173324; border-color:var(--green)}
  .pchip.add{padding:8px 13px; font-size:18px; color:var(--txt)}

  /* messaggio personale */
  #msgSheet{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:40; display:none;
    align-items:center; justify-content:center; padding:24px}
  #msgSheet.open{display:flex}
  .msg-box{background:var(--panel); border-radius:20px; padding:22px; width:100%; max-width:420px;
    box-shadow:0 12px 44px rgba(0,0,0,.5)}
  .msg-title{font-size:18px; font-weight:700; margin-bottom:12px}
  .msg-text{font-size:17px; line-height:1.55; white-space:pre-wrap; word-break:break-word; margin-bottom:18px}
  .msg-list{max-height:55vh; overflow-y:auto; margin-bottom:16px}
  .msg-item{background:var(--row2); border-radius:12px; padding:12px 14px; margin-bottom:8px}
  .msg-item-t{font-size:16px; line-height:1.45; white-space:pre-wrap; word-break:break-word}
  .msg-item-d{color:var(--muted); font-size:12px; margin-top:7px; display:flex; justify-content:space-between; align-items:center}
  .msg-item-d button{background:none; border:none; color:var(--red); font-size:12px; font-weight:600}
  .msg-btns{display:flex; gap:8px}
  .msg-btns button{flex:1; border:none; border-radius:12px; padding:13px 6px; font-size:14px; font-weight:700; background:var(--row); color:var(--txt)}
  .msg-btns button.send{background:var(--green); color:#173324}

  /* ============ ALIMENTAZIONE ============ */
  .home-sec{font-size:14px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
    color:var(--muted); margin:18px 18px 8px; text-shadow:0 1px 6px rgba(0,0,0,.6)}
  .foodhero{display:flex; align-items:center; gap:14px; margin:12px 16px; padding:16px;
    background:linear-gradient(135deg, rgba(126,217,167,.18), rgba(62,139,255,.16)), var(--panel);
    border-radius:var(--radius); box-shadow:0 6px 18px rgba(0,0,0,.28)}
  .foodhero .fh-ic{font-size:30px}
  .foodhero .fh-t{flex:1; min-width:0}
  .foodhero .fh-t b{display:block; font-size:18px}
  .foodhero .fh-t span{color:var(--muted); font-size:14px}
  .foodhero .chev{color:var(--muted); font-size:22px}

  .field select{width:100%; background:var(--panel); border:1px solid var(--row);
    border-radius:12px; color:var(--txt); font-size:17px; padding:13px}

  .fdaynav{display:flex; align-items:center; justify-content:space-between; margin:6px 16px 4px}
  .fdaynav button{background:var(--panel); border:none; color:var(--txt); width:40px; height:40px; border-radius:50%; font-size:20px}
  .fdaynav .fd-lab{font-weight:700; font-size:17px}

  .fsum{margin:8px 16px 4px; padding:16px; background:var(--panel); border-radius:var(--radius); box-shadow:0 4px 14px rgba(0,0,0,.22)}
  .fsum-k{display:flex; align-items:baseline; justify-content:space-between}
  .fsum-k b{font-size:28px}
  .fsum-k .goal{color:var(--muted); font-size:14px}
  .kfill{height:12px; background:var(--bg); border-radius:7px; overflow:hidden; margin-top:8px}
  .kfill>div{height:100%; background:linear-gradient(90deg,#3E8BFF,#7ED2FF); border-radius:7px; transition:width .3s}
  .macro{margin-top:11px}
  .macro-top{display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px}
  .macro-top .ml{color:var(--muted)}
  .mbar{height:9px; background:var(--bg); border-radius:6px; overflow:hidden}
  .mfill{height:100%; border-radius:6px; transition:width .3s}
  .mfill.p{background:#7ED9A7} .mfill.c{background:#F2C94C} .mfill.f{background:#EB8D59}

  .meal{margin:12px 16px; background:var(--row2); border-radius:var(--radius); overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.22)}
  .meal-h{display:flex; align-items:center; gap:8px; padding:13px 14px; font-weight:700}
  .meal-h .mk{color:var(--muted); font-weight:600; font-size:14px; margin-left:auto}
  .meal-h button{background:var(--green); color:#173324; border:none; width:32px; height:32px; border-radius:50%; font-size:21px; font-weight:700; line-height:1}
  .fitem{padding:11px 14px; border-top:1px solid rgba(0,0,0,.18)}
  .fitem .fi-name{font-size:15px}
  .fitem .fi-sub{color:var(--muted); font-size:13px; margin-top:2px}
  .meal-empty{padding:12px 14px; color:var(--muted); font-size:14px; border-top:1px solid rgba(0,0,0,.18)}

  .searchbar{display:flex; gap:8px; padding:12px 16px 4px}
  .searchbar input{flex:1; background:var(--panel); border:1px solid var(--row); border-radius:12px; color:var(--txt); font-size:16px; padding:12px}
  .searchbar button{background:var(--row); color:var(--txt); border:none; border-radius:12px; padding:0 15px; font-size:19px}
  .fsec-lab{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:16px 18px 7px}
  .frow{display:flex; align-items:center; gap:10px; margin:0 16px 8px; padding:12px 14px; background:var(--row2); border-radius:12px}
  .frow .fr-t{flex:1; min-width:0}
  .frow .fr-t b{font-size:15px; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .frow .fr-t span{color:var(--muted); font-size:13px}
  .frow .fr-add{background:var(--green); color:#173324; border:none; width:34px; height:34px; border-radius:50%; font-size:21px; flex-shrink:0; line-height:1}
  .frow .chev{color:var(--muted); font-size:20px}
  .fmsg{color:var(--muted); text-align:center; padding:18px; font-size:14px; line-height:1.5}

  #scanOverlay{position:fixed; inset:0; background:#000; z-index:50; display:none; align-items:center; justify-content:center}
  #scanOverlay.open{display:flex}
  #scanVideo{width:100%; height:100%; object-fit:cover}
  .scan-frame{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:74%; height:140px;
    border:3px solid var(--green); border-radius:14px; box-shadow:0 0 0 2000px rgba(0,0,0,.4)}
  .scan-btns{position:absolute; bottom:calc(24px + env(safe-area-inset-bottom)); left:16px; right:16px; display:flex; gap:10px}
  .scan-btns button{flex:1; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:700; background:var(--panel); color:var(--txt)}

  .fchart{display:flex; align-items:flex-end; gap:6px; height:150px; margin:8px 16px 12px; padding:14px 12px; background:var(--panel); border-radius:var(--radius)}
  .fbar{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end}
  .fbar .bar{width:100%; background:linear-gradient(180deg,#7ED2FF,#3E8BFF); border-radius:6px 6px 0 0; min-height:3px}
  .fbar .bl{color:var(--muted); font-size:11px}
  .fbar .bv{color:var(--txt); font-size:10px; min-height:12px}
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<div class="screen active" id="scr-home">
  <header><div class="spacer44"></div><h1>Gigio Gym</h1><div class="spacer44"></div></header>
  <main>
    <div id="profileBar"></div>
    <div id="msgCard"></div>
    <div id="foodHero"></div>
    <div id="waterCard"></div>
    <div id="weightCard"></div>
    <div id="trainingSection">
      <div class="home-sec">🏋️ Allenamento</div>
      <div id="homeList"></div>
      <div class="link-row">
        <button class="btn-ghost" onclick="openEditor(null)">+ Nuova scheda</button>
        <button class="btn-ghost" onclick="show('scr-history'); renderHistory()">Storico</button>
      </div>
    </div>
  </main>
</div>

<!-- ============ SCHEDA ============ -->
<div class="screen" id="scr-scheda">
  <header>
    <button class="btn-round" onclick="show('scr-home')">‹</button>
    <h1 id="schedaTitle"></h1>
    <button class="btn-round" onclick="openEditor(state.schedaId)" title="Modifica">✎</button>
  </header>
  <main><div id="schedaBody"></div></main>
  <button class="cta" onclick="startWorkout()">Comincia allenamento</button>
</div>

<!-- ============ ALLENAMENTO ============ -->
<div class="screen" id="scr-workout">
  <header>
    <button class="btn-round" onclick="confirmExit()">‹</button>
    <h1 id="woTitle"></h1>
    <div class="spacer44"></div>
  </header>
  <main><div id="woBody"></div></main>
  <button class="cta" id="woFinish" onclick="finishWorkout()">Termina allenamento</button>
</div>

<!-- ============ STORICO ============ -->
<div class="screen" id="scr-history">
  <header>
    <button class="btn-round" onclick="show('scr-home')">‹</button>
    <h1>Storico</h1>
    <div class="spacer44"></div>
  </header>
  <main><div id="histBody"></div></main>
</div>

<!-- ============ EDITOR ============ -->
<div class="screen" id="scr-editor">
  <header>
    <button class="btn-round" onclick="exitEditor()">‹</button>
    <h1 id="edTitle">Nuova scheda</h1>

<div id="toast"></div>

<script>
/* ================= DATI ================= */
const IMG = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';
const DEFAULT_SCHEDE = [{
  id:'s1', name:'Petto, spalle e tricipiti',
  groups:[
    {label:'Superset', exercises:[
      {name:'Chest press', sets:4, reps:'8 - 10', img:IMG+'Machine_Bench_Press/0.jpg'},
      {name:'Lento avanti con bilanciere seduto', sets:4, reps:'8 - 10', img:IMG+'Barbell_Shoulder_Press/0.jpg'}
    ]},
    {label:'Superset', exercises:[
      {name:'Distensioni su panca piana con manubri', sets:4, reps:'8 - 12', img:IMG+'Dumbbell_Bench_Press/0.jpg'},
      {name:'Alzate laterali con manubri', sets:4, reps:'12 - 15', img:IMG+'Side_Lateral_Raise/0.jpg'}
    ]},
    {label:'Superset', exercises:[
      {name:'Croci alla pectoral machine', sets:4, reps:'10 - 12', img:IMG+'Butterfly/0.jpg'},
      {name:'French press con manubri seduto due braccia', sets:4, reps:'10 - 12', img:IMG+'Seated_Triceps_Press/0.jpg'}
    ]}
  ]
},{
  id:'s2', name:'Gambe',
  groups:[
    {label:'Superset', exercises:[
      {name:'Front squat con bilanciere', sets:4, reps:'8 - 10', img:IMG+'Front_Barbell_Squat/0.jpg'},
      {name:'Stacco rumeno con bilanciere', sets:4, reps:'8 - 12', img:IMG+'Romanian_Deadlift/0.jpg'}
    ]},
    {label:'Superset', exercises:[
      {name:'Affondi in movimento con manubri', sets:3, reps:'10 - 12', img:IMG+'Dumbbell_Lunges/0.jpg'},
      {name:'Hip thrust con bilanciere', sets:3, reps:'10 - 12', img:IMG+'Barbell_Hip_Thrust/0.jpg'}
    ]},
    {label:'Superset', exercises:[
      {name:'Sollevamento polpacci in piedi a corpo libero', sets:4, reps:'15 - 20', img:IMG+'Standing_Calf_Raises/0.jpg'},
      {name:'Plank con oscillazioni dei fianchi', sets:4, reps:'00:45', img:IMG+'Plank/0.jpg'}
    ]}
  ]
},{
  id:'s3', name:'Schiena, dorsali posteriori, bicipiti',
  groups:[
    {label:'Superset', exercises:[
      {name:'Lat machine presa inversa', sets:4, reps:'8 - 12', img:IMG+'Underhand_Cable_Pulldowns/0.jpg'},
      {name:'Rematore con kettlebell a un braccio', sets:4, reps:'8 - 12', img:IMG+'One-Arm_Kettlebell_Row/0.jpg'}
    ]},
    {label:'Superset', exercises:[
      {name:'Scrollate con bilanciere', sets:3, reps:'12 - 15', img:IMG+'Barbell_Shrug/0.jpg'},
      {name:'Alzate posteriori con manubri', sets:3, reps:'12 - 15', img:IMG+'Seated_Bent-Over_Rear_Delt_Raise/0.jpg'}
    ]},
    {label:'Superset', exercises:[
      {name:'Curl con bilanciere EZ', sets:3, reps:'10 - 12', img:IMG+'EZ-Bar_Curl/0.jpg'},
      {name:'Hammer curl con manubri', sets:3, reps:'10 - 12', img:IMG+'Hammer_Curls/0.jpg'}
    ]}
  ]
}];

const _mem = {}; // fallback in memoria se localStorage non è disponibile (es. navigazione privata)
// chiavi che appartengono al SINGOLO profilo (persona). Le altre (schede, sessioni) sono condivise.
const PROFILE_KEYS = new Set(['gg_weights','gg_water','gg_water_goal','gg_food_goals','gg_food_diary','gg_food_recent','gg_food_custom','gg_food_dishes','gg_food_profile','gg_message']);
let profiles = null, activeProfile = null;
function pk(k){ return (activeProfile && PROFILE_KEYS.has(k)) ? ('gg_p_' + activeProfile + '_' + k) : k; }
function rawGet(k){ try{ const v = localStorage.getItem(k); if(v != null) return JSON.parse(v); }catch(e){} return (k in _mem) ? _mem[k] : undefined; }
const store = {
  get(k, fallback){ k = pk(k);
    try{ const v = localStorage.getItem(k); if(v != null) return JSON.parse(v); }catch(e){}
    return (k in _mem) ? _mem[k] : fallback;
  },
  set(k, v){ k = pk(k); _mem[k] = v;
    try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){}
  }
};
let schede = store.get('gg_schede', null);
if(!schede){ schede = DEFAULT_SCHEDE; store.set('gg_schede', schede); }
// aggiunge una tantum le schede predefinite nuove a chi ha già l'app installata,
// senza toccare le schede create dall'utente né lo storico
if(!store.get('gg_seed_v2', false)){
  DEFAULT_SCHEDE.forEach(d=>{ if(!schede.some(s=>s.id===d.id)) schede.push(d); });
  store.set('gg_schede', schede);
  store.set('gg_seed_v2', true);
}
let sessions = store.get('gg_sessions', []);
let lastLog = store.get('gg_last', {}); // nomeEsercizio -> [{kg,reps}, ...]

// ---- profili (persone): peso, acqua e alimentazione sono per-profilo ----
profiles = store.get('gg_profiles', null);
if(!profiles || !profiles.length){ profiles = ['Gigio','Erjola']; store.set('gg_profiles', profiles); }
activeProfile = store.get('gg_active_profile', null);
if(!activeProfile || profiles.indexOf(activeProfile) < 0){ activeProfile = profiles[0]; store.set('gg_active_profile', activeProfile); }
// una-tantum: sposta i dati esistenti (chiavi vecchie) dentro il primo profilo, così non si perde nulla
if(!store.get('gg_migrated_profiles', false)){
  PROFILE_KEYS.forEach(function(k){ const old = rawGet(k); if(old !== undefined) store.set(k, old); });
  store.set('gg_migrated_profiles', true);
}

// acqua: si azzera ogni nuovo giorno
function todayStr(){ return new Date().toISOString().slice(0,10); }
let water = store.get('gg_water', null);
if(!water || water.date !== todayStr()){ water = { date: todayStr(), ml: 0 }; store.set('gg_water', water); }
let waterGoal = store.get('gg_water_goal', 2000);

// peso: elenco misurazioni, più recente in cima
let weights = store.get('gg_weights', []); // [{date, kg}]

const state = { schedaId:null, workout:null, editor:null };

/* ================= NAVIGAZIONE ================= */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function imgTag(url){
  if(url) return '<img src="'+esc(url)+'" loading="lazy" onerror="this.outerHTML=\'<div class=ph>🏋️</div>\'">';
  return '<div class="ph">🏋️</div>';
}
function repsUnit(reps){ return /[:]|sec/i.test(String(reps)) ? '' : ' ripetizioni'; }

/* ================= HOME ================= */
function renderHome(){
  const el = document.getElementById('homeList');
  if(!schede.length){
    el.innerHTML = '<div class="empty">Nessuna scheda.<br>Creane una con “Nuova scheda”.</div>';
    return;
  }
  el.innerHTML = schede.map(s=>{
    const nEx = s.groups.reduce((a,g)=>a+g.exercises.length,0);
    return '<div class="card" onclick="openScheda(\''+s.id+'\')">'+
      '<div class="t"><b>'+esc(s.name)+'</b><span>'+nEx+' esercizi · '+s.groups.length+' gruppi</span></div>'+
      '<div class="chev">›</div></div>';
  }).join('');
}

/* ================= SCHEDA ================= */
function openScheda(id){
  state.schedaId = id;
  const s = schede.find(x=>x.id===id); if(!s) return;
  document.getElementById('schedaTitle').textContent = s.name;
  document.getElementById('schedaBody').innerHTML = s.groups.map(g=>
    '<div class="sc-group">'+
      '<div class="sc-glabel">'+esc(g.label||'Superset')+'</div>'+
      '<div class="sc-card">'+ g.exercises.map(e=>
        '<div class="sc-ex">'+
          '<div class="ex-img">'+imgTag(e.img)+'</div>'+
          '<div class="sc-info"><div class="sc-name">'+esc(e.name)+'</div>'+
          '<div class="sc-badges">'+
            '<span class="sc-badge">'+e.sets+' serie</span>'+
            '<span class="sc-badge alt">'+esc(e.reps)+(repsUnit(e.reps)?' rip':'')+'</span>'+
          '</div></div>'+
        '</div>').join('') +'</div>'+
    '</div>'
  ).join('');
  show('scr-scheda');
}

/* ================= ALLENAMENTO ================= */
function startWorkout(){
  const s = schede.find(x=>x.id===state.schedaId); if(!s) return;
  const exercises = [];
  s.groups.forEach(g=>g.exercises.forEach(e=>exercises.push(e)));
  state.workout = {
    schedaId:s.id, schedaName:s.name, start:Date.now(),
    log: exercises.map(e=>({
      name:e.name, img:e.img, reps:e.reps,
      sets: Array.from({length:e.sets}, (_,i)=>{
        const last = (lastLog[e.name]||[])[i] || {};
        return { kg:last.kg ?? '', reps:last.reps ?? '', done:false };
      })
    }))
  };
  document.getElementById('woTitle').textContent = s.name;
  renderWorkout();
  show('scr-workout');
}

function renderWorkout(){
  const w = state.workout;
  document.getElementById('woBody').innerHTML = w.log.map((ex,ei)=>{
    const last = lastLog[ex.name];
    const hint = last ? '<div class="last-hint">Ultima volta: '+ last.map(s=>(s.kg||'–')+'kg × '+(s.reps||'–')).join(' · ') +'</div>' : '';
    const doneCount = ex.sets.filter(s=>s.done).length;
    return '<div class="wo-ex">'+
      '<div class="wo-head"><div class="ex-img">'+imgTag(ex.img)+'</div>'+
      '<div class="wo-hinfo"><div class="n">'+esc(ex.name)+'</div>'+
      '<div class="m">'+ex.sets.length+' serie · obiettivo '+esc(ex.reps)+repsUnit(ex.reps)+'</div>'+
      '<div class="wo-prog">'+doneCount+'/'+ex.sets.length+' completate</div></div></div>'+
      hint +
      ex.sets.map((st,si)=>
        '<div class="set-line"><div class="num">'+(si+1)+'</div>'+
        '<input type="number" inputmode="decimal" placeholder="kg" value="'+esc(st.kg)+'" onchange="setVal('+ei+','+si+',\'kg\',this.value)">'+
        '<label>kg</label>'+
        '<input type="number" inputmode="numeric" placeholder="rip" value="'+esc(st.reps)+'" onchange="setVal('+ei+','+si+',\'reps\',this.value)">'+
        '<label>rip</label>'+
        '<button class="set-done'+(st.done?' on':'')+'" onclick="toggleDone('+ei+','+si+')">✓</button></div>'
      ).join('')+
      '<div class="wo-setctl">'+
        '<button onclick="removeSet('+ei+')">− Serie</button>'+
        '<button onclick="addSet('+ei+')">＋ Serie</button>'+
      '</div>'+
    '</div>';
  }).join('');
}
function addSet(ei){ state.workout.log[ei].sets.push({kg:'', reps:'', done:false}); renderWorkout(); }
function removeSet(ei){
  const s = state.workout.log[ei].sets;
  if(s.length > 1){ s.pop(); renderWorkout(); } else { toast('Serve almeno una serie'); }
}
function setVal(ei,si,field,val){ state.workout.log[ei].sets[si][field] = val; }
function toggleDone(ei,si){
  const st = state.workout.log[ei].sets[si];
  st.done = !st.done;
  event.target.classList.toggle('on', st.done);
  if(st.done) timerStart(90);
}

function finishWorkout(){
  const w = state.workout;
  const anyDone = w.log.some(e=>e.sets.some(s=>s.done || s.kg || s.reps));
  if(!anyDone){ if(!confirm('Nessun set registrato. Terminare comunque?')) return; }
  // salva "ultima volta" per prefill
  w.log.forEach(e=>{
    const filled = e.sets.filter(s=>s.kg||s.reps);
    if(filled.length) lastLog[e.name] = e.sets.map(s=>({kg:s.kg, reps:s.reps}));
  });
  store.set('gg_last', lastLog);
  sessions.unshift({
    date:new Date().toISOString(), scheda:w.schedaName,
    durataMin: Math.max(1, Math.round((Date.now()-w.start)/60000)),
    log: w.log.map(e=>({name:e.name, sets:e.sets.filter(s=>s.kg||s.reps||s.done)}))
  });
  store.set('gg_sessions', sessions);
  state.workout = null;
  timerStop();
  toast('Allenamento salvato 💪');
  show('scr-home'); renderHome();
}
function confirmExit(){
  if(confirm('Uscire senza salvare l\'allenamento?')){ state.workout=null; timerStop(); show('scr-scheda'); }
}

/* ================= TIMER ================= */
let tLeft = 0, tInt = null;
function timerStart(sec){
  tLeft = sec;
  document.getElementById('timerSheet').classList.add('open');
  timerTick();
  clearInterval(tInt);
  tInt = setInterval(()=>{ tLeft--; timerTick();
    if(tLeft<=0){ timerStop(); beep(); if(navigator.vibrate) navigator.vibrate([300,150,300]); }
  },1000);
}
function timerTick(){
  const m = Math.floor(Math.max(0,tLeft)/60), s = Math.max(0,tLeft)%60;
  document.getElementById('timerVal').textContent = m+':'+String(s).padStart(2,'0');
}
function timerPlus(){ tLeft += 30; timerTick(); }
function timerStop(){ clearInterval(tInt); document.getElementById('timerSheet').classList.remove('open'); }
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.7].forEach(t=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; g.gain.setValueAtTime(0.35, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.28);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

/* ================= STORICO ================= */
function renderHistory(){
  const el = document.getElementById('histBody');
  if(!sessions.length){ el.innerHTML = '<div class="empty">Ancora nessun allenamento salvato.<br>Il primo lo scrivi tu 💪</div>'; return; }
  el.innerHTML = sessions.map((s,i)=>{
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('it-IT',{weekday:'short', day:'numeric', month:'short'})+' · '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    const detail = s.log.filter(e=>e.sets.length).map(e=>
      '<div class="exl"><b>'+esc(e.name)+'</b><span>'+ e.sets.map(x=>(x.kg||'–')+'kg × '+(x.reps||'–')).join(' · ') +'</span></div>'
    ).join('') || '<div class="exl"><span>Nessun set registrato</span></div>';
    return '<div class="sess" onclick="this.classList.toggle(\'open\')">'+
      '<div class="d">'+esc(s.scheda)+'</div>'+
      '<div class="s">'+dateStr+' · '+s.durataMin+' min</div>'+
      '<div class="detail">'+detail+'</div></div>';
  }).join('');
}

/* ================= EDITOR ================= */
function openEditor(id){
  const s = id ? schede.find(x=>x.id===id) : null;
  state.editor = s ? JSON.parse(JSON.stringify(s))
                   : { id:'s'+Date.now(), name:'', groups:[{label:'Superset', exercises:[edNewEx()]}] };
  state.editor._isNew = !s;
  document.getElementById('edTitle').textContent = s ? 'Modifica scheda' : 'Nuova scheda';
  document.getElementById('edName').value = state.editor.name;

/* ================= PESO ================= */
function daysAgo(iso){ return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000); }
function fmtDay(iso){ return new Date(iso).toLocaleDateString('it-IT',{day:'numeric', month:'short', year:'2-digit'}); }
function agoLabel(iso){
  const d = daysAgo(iso);
  if(d <= 0) return 'oggi';
  if(d === 1) return 'ieri';
  return d + ' giorni fa';
}
function deltaHtml(delta){
  if(delta === null || delta === undefined) return '';
  const a = Math.abs(delta).toFixed(1);
  if(delta < 0) return '<span class="w-delta down">▼ '+a+' kg</span> · ';
  if(delta > 0) return '<span class="w-delta up">▲ '+a+' kg</span> · ';
  return '<span class="w-delta">± 0 kg</span> · ';
}
function renderWeight(){
  const el = document.getElementById('weightCard'); if(!el) return;
  if(!weights.length){
    el.innerHTML =
      '<div class="weight"><div class="w-top"><div class="w-title">⚖️ Peso</div></div>'+
      '<div class="w-sub">Segna il tuo peso per iniziare a monitorarlo.</div>'+
      '<div class="w-btns"><button onclick="addWeight()">Segna peso</button></div></div>';
    return;
  }
  const last = weights[0], prev = weights[1];
  const delta = prev ? (last.kg - prev.kg) : null;
  const first = weights[weights.length - 1];
  const since = weights.length >= 2
    ? '<div class="w-sub">📉 Dall\'inizio ('+fmtDay(first.date)+'): '+deltaHtml(last.kg - first.kg).replace(' · ','')+'</div>' : '';
  const due = daysAgo(last.date) >= 14
    ? '<div class="w-due">🔔 Sono passate 2 settimane: aggiorna il peso</div>' : '';
  el.innerHTML =
    '<div class="weight">'+
      '<div class="w-top"><div class="w-title">⚖️ Peso</div>'+
      '<div class="w-current"><b>'+last.kg.toFixed(1)+'</b> kg</div></div>'+
      '<div class="w-sub">'+ deltaHtml(delta) +'ultimo: '+fmtDay(last.date)+' ('+agoLabel(last.date)+')</div>'+
      since + due +
      '<div class="w-btns"><button onclick="addWeight()">Aggiorna peso</button>'+
      '<button class="ghost" onclick="toggleWeightHistory()">Storico</button></div>'+
      '<div class="w-hist" id="wHist"></div>'+

function addWeight(){
  const v = prompt('Il tuo peso oggi (kg):', weights[0] ? weights[0].kg : '');

  const kg = parseFloat(String(v).replace(',', '.'));

const MEALS = [['colazione','Colazione','🍳'],['pranzo','Pranzo','🍝'],['cena','Cena','🍽️'],['spuntini','Spuntini','🍎']];
const MEAL_KEYS = ['colazione','pranzo','cena','spuntini'];
let foodGoals  = store.get('gg_food_goals', { kcal:2000, protein:150, carbs:200, fat:60 });
let foodDiary  = store.get('gg_food_diary', {});   // {data: {colazione:[], pranzo:[], cena:[], spuntini:[]}}
let foodRecent = store.get('gg_food_recent', []);  // [{name,k,p,c,f,code}]

function num(v){ const x = parseFloat(String(v == null ? '' : v).replace(',', '.')); return isNaN(x) ? 0 : x; }
function r1(x){ return Math.round(num(x) * 10) / 10; }
function foodDay(d){
  if(!foodDiary[d]) foodDiary[d] = {};
  MEAL_KEYS.forEach(k => { if(!foodDiary[d][k]) foodDiary[d][k] = []; });
  return foodDiary[d];
}
function itemTot(it){
  if(it.base && it.grams != null){ const g = it.grams / 100;
    return { k:it.base.k*g, p:it.base.p*g, c:it.base.c*g, f:it.base.f*g }; }
  const t = it.tot || {k:0,p:0,c:0,f:0}; return { k:t.k, p:t.p, c:t.c, f:t.f };
}
function dayTotals(d){
  const day = foodDiary[d]; const t = {k:0,p:0,c:0,f:0}; if(!day) return t;
  MEAL_KEYS.forEach(m => (day[m]||[]).forEach(it => { const x = itemTot(it); t.k+=x.k; t.p+=x.p; t.c+=x.c; t.f+=x.f; }));
  return { k:Math.round(t.k), p:Math.round(t.p), c:Math.round(t.c), f:Math.round(t.f) };
}

async function doFoodSearch(){

    body.insertAdjacentHTML('afterbegin', '<div class="fmsg">📴 Sei offline: la ricerca non è disponibile.<br>Usa i tuoi recenti/preferiti qui sotto.</div>');
  }
}
const FOOD_STOP = new Set(['di','e','con','al','all','alla','allo','agli','ai','la','il','lo','le','i','gli',
  'un','uno','una','del','della','dello','dei','degli','delle','a','da','in','su','per','the','of']);
function foodWords(q){ return q.toLowerCase().split(/[\s'’,._\-]+/).filter(w => w.length > 1 && !FOOD_STOP.has(w)); }
function rankFood(items, q){
  const ql = q.toLowerCase().trim();
  const words = foodWords(q);
  const scored = items.map(x => {
    const nm = x.name.toLowerCase();
    let s = 0, matched = 0;
    if(ql && nm.indexOf(ql) > -1) s += 100;                    // frase intera presente
    words.forEach(w => { if(nm.indexOf(w) > -1){ s += 15; matched++; } });
    if(words.length && matched === words.length) s += 40;      // tutte le parole chiave
    s -= Math.min(15, nm.length / 8);                          // preferisci nomi puliti
    return { x:x, s:s, matched:matched };
  });
  return scored.filter(o => !words.length || o.matched > 0)    // scarta i totalmente fuori tema
    .sort((a,b) => b.s - a.s).map(o => o.x);
}
function mapOff(p){
  const n = p.nutriments || {};
  let kcal = n['energy-kcal_100g'];
  if(kcal == null && n['energy_100g'] != null) kcal = n['energy_100g'] / 4.184;
  let name = (p.product_name_it || p.product_name || '').trim(); if(!name) return null;
  if(p.brands) name += ' (' + String(p.brands).split(',')[0].trim() + ')';
  return { name:name, k:r1(kcal), p:r1(n.proteins_100g), c:r1(n.carbohydrates_100g), f:r1(n.fat_100g), code:p.code || '' };
}
async function offSearchRaw(q, italyOnly){
  let url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms=' + encodeURIComponent(q) +
    '&search_simple=1&action=process&json=1&page_size=50&sort_by=unique_scans_n&lc=it' +
    '&fields=product_name,product_name_it,brands,nutriments,code';
  if(italyOnly) url += '&tagtype_0=countries&tag_contains_0=contains&tag_0=italy';
  const r = await fetch(url); if(!r.ok) throw new Error('http');
  const d = await r.json();
  const items = (d.products || []).map(mapOff).filter(Boolean).filter(x => x.k > 0);  // solo con calorie
  return rankFood(items, q).slice(0, 25);
}
async function offSearch(q){
  let items = await offSearchRaw(q, true);                     // prima i prodotti italiani
  if(items.length < 4){                                        // se pochi, completa col globale
    const glob = await offSearchRaw(q, false);
    const seen = new Set(items.map(x => x.code || x.name));
    glob.forEach(x => { const k = x.code || x.name; if(!seen.has(k)){ seen.add(k); items.push(x); } });
    items = rankFood(items, q).slice(0, 25);
  }
  return items;
}
async function offBarcode(code){
  const url = 'https://world.openfoodfacts.org/api/v2/product/' + encodeURIComponent(code) +
    '.json?fields=product_name,product_name_it,brands,nutriments,code';
  const r = await fetch(url); if(!r.ok) throw new Error('http');
  const d = await r.json();
  return (d && d.status === 1 && d.product) ? mapOff(d.product) : null;
}
function openCustomFood(){ ['cfName','cfKcal','cfP','cfC','cfF'].forEach(id => document.getElementById(id).value = ''); show('scr-foodcustom'); }
function saveCustomFood(){
  const name = document.getElementById('cfName').value.trim();
  if(!name){ toast('Dai un nome all\'alimento'); return; }
  const f = { name:name, k:r1(document.getElementById('cfKcal').value), p:r1(document.getElementById('cfP').value),
    c:r1(document.getElementById('cfC').value), f:r1(document.getElementById('cfF').value) };
  foodCustom.unshift(f); store.set('gg_food_custom', foodCustom);
  toast('Alimento salvato'); renderFoodSearch(); show('scr-foodsearch');
}
function openDish(){ dishDraft = { items: [] }; document.getElementById('dfName').value = ''; renderDishBuilder(); show('scr-fooddish'); }
function dishTotals(){
  const t = {k:0,p:0,c:0,f:0};
  dishDraft.items.forEach(it => { const x = itemTot(it); t.k+=x.k; t.p+=x.p; t.c+=x.c; t.f+=x.f; });
  return { k:Math.round(t.k), p:Math.round(t.p), c:Math.round(t.c), f:Math.round(t.f) };
}
function renderDishBuilder(){
  const el = document.getElementById('dishBody'); if(!el) return;
  const t = dishTotals();
  let h = '<div class="fsum"><div class="fsum-k"><b>'+t.k+' kcal</b><span class="goal">totale piatto</span></div>'+
    '<div class="macro-top" style="margin-top:10px"><span class="ml">Proteine</span><span>'+t.p+' g</span></div>'+
    '<div class="macro-top"><span class="ml">Carboidrati</span><span>'+t.c+' g</span></div>'+
    '<div class="macro-top"><span class="ml">Grassi</span><span>'+t.f+' g</span></div></div>';
  h += '<div class="fsec-lab">Ingredienti</div>';
  if(!dishDraft.items.length) h += '<div class="fmsg">Aggiungi gli ingredienti: l\'app calcola da sola calorie e macro.</div>';
  else h += dishDraft.items.map((it,i) => '<div class="frow"><div class="fr-t"><b>'+esc(it.name)+'</b>'+
    '<span>'+it.grams+' g · '+Math.round(itemTot(it).k)+' kcal</span></div>'+
    '<button class="fr-add" style="background:var(--row); color:var(--red); font-size:17px" onclick="dishDelIngredient('+i+')">✕</button></div>').join('');
  h += '<button class="add-line btn-add-group" onclick="dishAddIngredient()">+ Aggiungi ingrediente</button>';
  el.innerHTML = h;
}
function dishAddIngredient(){
  foodTarget = 'dish'; foodSearchResults = [];
  document.getElementById('foodQ').value = '';
  document.getElementById('foodSearchActions').style.display = 'none';
  document.getElementById('foodSearchTitle').textContent = 'Aggiungi ingrediente';
  renderFoodSearch(); show('scr-foodsearch');
}
function dishDelIngredient(i){ dishDraft.items.splice(i,1); renderDishBuilder(); }
function cancelDish(){ foodTarget = 'meal'; document.getElementById('foodSearchActions').style.display = ''; show('scr-foodsearch'); }
function saveDish(){
  const name = document.getElementById('dfName').value.trim();
  if(!name){ toast('Dai un nome al piatto'); return; }
  if(!dishDraft.items.length){ toast('Aggiungi almeno un ingrediente'); return; }
  const t = dishTotals();
  foodDishes.unshift({ name:name, k:t.k, p:t.p, c:t.c, f:t.f, items:dishDraft.items });
  store.set('gg_food_dishes', foodDishes);
  dishDraft = { items: [] };
  foodTarget = 'meal'; document.getElementById('foodSearchActions').style.display = '';
  toast('Piatto salvato ✓'); renderFoodSearch(); show('scr-foodsearch');
}
function openFoodGoals(){
  document.getElementById('gKcal').value = foodGoals.kcal;
  document.getElementById('gP').value = foodGoals.protein;
  document.getElementById('gC').value = foodGoals.carbs;
  document.getElementById('gF').value = foodGoals.fat;
  const pr = store.get('gg_food_profile', null);
  document.getElementById('cName').value = (pr && pr.name) || '';
  document.getElementById('cRate').value = (pr && pr.rate) || 'moderato';
  if(pr){
    document.getElementById('cWeight').value = pr.weight || '';
    document.getElementById('cHeight').value = pr.height || '';
    document.getElementById('cAge').value = pr.age || '';
    document.getElementById('cSex').value = pr.sex || 'm';
    document.getElementById('cAct').value = pr.activity || '1.55';
    document.getElementById('cGoal').value = pr.goal || 'mantenere';
  }
  // collega il monitoraggio peso: usa l'ultimo peso registrato, se c'è
  if(weights.length && weights[0].kg) document.getElementById('cWeight').value = weights[0].kg;
  const info = document.getElementById('calcInfo'); if(info) info.style.display = 'none';
  show('scr-foodgoals');
}
function calcGoals(){
  const w = num(document.getElementById('cWeight').value), h = num(document.getElementById('cHeight').value), a = num(document.getElementById('cAge').value);
  const sex = document.getElementById('cSex').value, act = num(document.getElementById('cAct').value), goal = document.getElementById('cGoal').value;
  if(!(w > 0 && h > 0 && a > 0)){ toast('Inserisci peso, altezza ed età'); return; }
  const rate = document.getElementById('cRate').value;
  const bmr = 10*w + 6.25*h - 5*a + (sex === 'm' ? 5 : -161);
  const tdee = Math.round(bmr * act);
  let factor = 1;
  if(goal === 'dimagrire') factor = rate === 'leggero' ? 0.90 : rate === 'aggressivo' ? 0.75 : 0.82;
  else if(goal === 'massa') factor = rate === 'leggero' ? 1.06 : rate === 'aggressivo' ? 1.15 : 1.10;
  const kcal = Math.round(tdee * factor);
  const protein = Math.round(2 * w);
  const fat = Math.round(0.9 * w);
  const carbs = Math.max(0, Math.round((kcal - (protein*4 + fat*9)) / 4));
  document.getElementById('gKcal').value = kcal;
  document.getElementById('gP').value = protein;
  document.getElementById('gC').value = carbs;
  document.getElementById('gF').value = fat;
  const diff = kcal - tdee;
  const info = document.getElementById('calcInfo');
  if(info){
    info.style.display = 'block';
    const etichetta = diff < 0 ? 'deficit' : diff > 0 ? 'surplus' : 'mantenimento';
    info.innerHTML = 'Mantenimento ≈ <b>'+tdee+'</b> kcal · Obiettivo <b>'+kcal+'</b> kcal'+
      (diff !== 0 ? '<br>'+(diff<0?'−':'+')+Math.abs(diff)+' kcal/giorno ('+etichetta+')' : '');
  }
  store.set('gg_food_profile', { name:document.getElementById('cName').value.trim(), weight:w, height:h, age:a, sex:sex, activity:String(act), goal:goal, rate:rate });
  toast('Valori proposti — puoi modificarli e salvare');
}
function saveGoals(){
  foodGoals = {
    kcal: Math.round(num(document.getElementById('gKcal').value)) || 2000,
    protein: Math.round(num(document.getElementById('gP').value)),
    carbs: Math.round(num(document.getElementById('gC').value)),
    fat: Math.round(num(document.getElementById('gF').value))
  };
  store.set('gg_food_goals', foodGoals);
  const prof = store.get('gg_food_profile', {}) || {};
  prof.name = document.getElementById('cName').value.trim();
  store.set('gg_food_profile', prof);
  toast('Obiettivi salvati'); renderFoodHero(); renderFood(); show('scr-food');
}
function renderFoodHistory(){
  const el = document.getElementById('foodHistBody'); if(!el) return;
  const days = [];
  for(let i = 6; i >= 0; i--){ const d = new Date(todayStr() + 'T12:00:00'); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    days.push({ ds:ds, k:dayTotals(ds).k, lab:d.toLocaleDateString('it-IT',{weekday:'short'}).slice(0,3) }); }
  const max = Math.max(foodGoals.kcal, ...days.map(x => x.k), 1);
  let chart = '<div class="fsec-lab">Ultimi 7 giorni</div><div class="fchart">' + days.map(x => {
    const bh = Math.round(x.k / max * 100);
    return '<div class="fbar"><div class="bv">'+(x.k || '')+'</div><div class="bar" style="height:'+bh+'%"></div><div class="bl">'+x.lab+'</div></div>';
  }).join('') + '</div>';
  const dates = Object.keys(foodDiary).filter(d => dayTotals(d).k > 0).sort().reverse();
  let list = '<div class="fsec-lab">Giorni registrati</div>';
  if(!dates.length) list += '<div class="fmsg">Ancora nessun pasto registrato.</div>';
  else list += dates.map(d => { const t = dayTotals(d);
    return '<div class="frow" onclick="openFoodDay(\''+d+'\')"><div class="fr-t"><b>'+dayLabel(d)+'</b>'+
      '<span>'+t.k+' kcal · P'+t.p+' C'+t.c+' G'+t.f+'</span></div><div class="chev">›</div></div>';
  }).join('');
  el.innerHTML = chart + list;
}

/* --- scanner codice a barre --- */
let _zxingP = null, _scan = {};
function loadZxing(){
  if(window.ZXing) return Promise.resolve();
  if(_zxingP) return _zxingP;
  _zxingP = new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';
    s.onload = () => res(); s.onerror = () => rej(new Error('zxing'));
    document.head.appendChild(s);
  });
  return _zxingP;
}
async function scanBarcode(){
  const overlay = document.getElementById('scanOverlay'), video = document.getElementById('scanVideo');
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ manualBarcode(); return; }
  overlay.classList.add('open');
  if('BarcodeDetector' in window){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
      _scan.stream = stream; video.srcObject = stream; await video.play();
      const det = new window.BarcodeDetector({ formats:['ean_13','ean_8','upc_a','upc_e','code_128'] });
      _scan.timer = setInterval(async () => {
        try{ const c = await det.detect(video); if(c && c.length) onBarcode(c[0].rawValue); }catch(e){}
      }, 500);
      return;
    }catch(e){}
  }
  try{
    await loadZxing();
    const reader = new window.ZXing.BrowserMultiFormatReader();
    _scan.reader = reader;
    reader.decodeFromVideoDevice(null, video, (result) => { if(result) onBarcode(result.getText()); });
  }catch(e){ closeScan(); manualBarcode(); }
}
function closeScan(){
  const overlay = document.getElementById('scanOverlay'), video = document.getElementById('scanVideo');
  if(_scan.timer){ clearInterval(_scan.timer); _scan.timer = null; }
  if(_scan.reader){ try{ _scan.reader.reset(); }catch(e){} _scan.reader = null; }
  if(_scan.stream){ _scan.stream.getTracks().forEach(t => t.stop()); _scan.stream = null; }
  if(video) video.srcObject = null;
  if(overlay) overlay.classList.remove('open');
}
async function onBarcode(code){
  closeScan(); if(!code) return;
  toast('Cerco il prodotto…');
  try{ const f = await offBarcode(String(code).trim()); if(f) pickFood(f); else toast('Prodotto non trovato'); }
  catch(e){ toast('📴 Offline: impossibile cercare il codice'); }
}
function manualBarcode(){
  const code = prompt('Inserisci il numero del codice a barre:');
  if(code && code.trim()) onBarcode(code.trim());
}

/* ================= PROFILI (PERSONE) ================= */
function renderProfileBar(){
  const el = document.getElementById('profileBar'); if(!el) return;
  el.innerHTML = '<div class="pbar">' + profiles.map(function(p){
    return '<button class="pchip'+(p === activeProfile ? ' on' : '')+'" onclick="switchProfile(\''+p.replace(/'/g,"\\'")+'\')">'+esc(p)+'</button>';
  }).join('') + '<button class="pchip add" onclick="addProfile()" title="Aggiungi persona">＋</button></div>';
  updateTrainingVisibility();
}
// l'allenamento è solo per il primo profilo (Gigio); negli altri viene nascosto
function trainingEnabled(){ return activeProfile === profiles[0]; }
function updateTrainingVisibility(){
  const el = document.getElementById('trainingSection');
  if(el) el.style.display = trainingEnabled() ? '' : 'none';
}
function reloadProfileData(){
  weights   = store.get('gg_weights', []);
  water     = store.get('gg_water', null);
  if(!water || water.date !== todayStr()){ water = { date: todayStr(), ml: 0 }; store.set('gg_water', water); }
  waterGoal = store.get('gg_water_goal', 2000);
  foodGoals = store.get('gg_food_goals', { kcal:2000, protein:150, carbs:200, fat:60 });
  foodDiary = store.get('gg_food_diary', {});
  foodRecent= store.get('gg_food_recent', []);
  foodCustom= store.get('gg_food_custom', []);
  foodDishes= store.get('gg_food_dishes', []);
  profileMsgs= normalizeMsgs(store.get('gg_message', []));
  foodDate  = todayStr();
}
function switchProfile(name){
  if(profiles.indexOf(name) < 0) return;
  activeProfile = name; store.set('gg_active_profile', name);
  reloadProfileData();
  renderProfileBar(); renderMsgCard(); renderWater(); renderWeight(); renderFoodHero();
  show('scr-home'); window.scrollTo(0,0);
  toast('Profilo: ' + name);
}
/* messaggi del profilo (elenco che si accumula) */
function normalizeMsgs(v){
  if(typeof v === 'string') return v.trim() ? [{ text:v, date:new Date().toISOString() }] : [];
  return Array.isArray(v) ? v : [];
}
function renderMsgCard(){
  const el = document.getElementById('msgCard'); if(!el) return;
  if(activeProfile === profiles[0]){ el.innerHTML = ''; return; }  // sul profilo principale (Gigio) niente messaggi
  const n = profileMsgs.length;
  const sub = n ? (n === 1 ? '1 messaggio · tocca per leggere' : n + ' messaggi · tocca per leggere')
                : 'Nessun messaggio — tocca per aggiungerne uno';
  el.innerHTML = '<div class="foodhero" onclick="openMessage()" '+
    'style="background:linear-gradient(135deg,rgba(229,115,115,.20),rgba(126,217,167,.12)),var(--panel)">'+
    '<div class="fh-ic">💌</div><div class="fh-t"><b>Messaggi</b><span>'+sub+'</span></div>'+
    '<div class="chev">›</div></div>';
}
function renderMsgList(){
  const el = document.getElementById('msgList'); if(!el) return;
  if(!profileMsgs.length){ el.innerHTML = '<div class="fmsg">Nessun messaggio.<br>Tocca "Aggiungi" per scriverne uno.</div>'; return; }
  el.innerHTML = profileMsgs.map(function(m,i){
    return '<div class="msg-item"><div class="msg-item-t">'+esc(m.text)+'</div>'+
      '<div class="msg-item-d"><span>'+fmtDay(m.date)+'</span><button onclick="delMessage('+i+')">elimina</button></div></div>';
  }).join('');
}
function openMessage(){
  profileMsgs = normalizeMsgs(store.get('gg_message', []));
  renderMsgList();
  document.getElementById('msgSheet').classList.add('open');
}
function closeMessage(){ document.getElementById('msgSheet').classList.remove('open'); }
function addMessage(){
  const v = prompt('Scrivi il messaggio:'); if(v === null) return;
  const t = v.trim(); if(!t) return;
  profileMsgs.unshift({ text:t, date:new Date().toISOString() });
  store.set('gg_message', profileMsgs);
  renderMsgList(); renderMsgCard();
}
function delMessage(i){
  if(!confirm('Eliminare questo messaggio?')) return;
  profileMsgs.splice(i,1);
  store.set('gg_message', profileMsgs);
  renderMsgList(); renderMsgCard();
}
function addProfile(){
  const name = prompt('Nome della persona:'); if(name === null) return;
  const n = name.trim(); if(!n){ return; }
  if(profiles.indexOf(n) < 0){ profiles.push(n); store.set('gg_profiles', profiles); }
  switchProfile(n);
}
